{% extends "base.html" %}
{% block content %}
<div class="page-card">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div>
            <h2 class="page-title mb-1">{% if user_obj %}사용자 수정{% else %}사용자 등록{% endif %}</h2>
            <div class="text-secondary">계정 정보와 그룹 권한, 사번을 함께 지정합니다.</div>
        </div>
        <a href="/admin-users/" class="btn btn-outline-secondary">목록</a>
    </div>

    {% if errors %}
    <div class="alert alert-danger">
        {% for error in errors %}
            <div>{{ error }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" class="row g-3">
        {{ csrf_input }}
        <div class="col-md-4">
            <label class="form-label">아이디</label>
            <input type="text" name="username" class="form-control" value="{{ user_obj.username if user_obj else '' }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">사번</label>
            <input type="text" name="employee_no" class="form-control" value="{{ profile_employee_no if profile_employee_no else '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label">비밀번호{% if user_obj %} <span class="text-secondary fw-normal" style="font-size:0.85em;">(조회 불가 · 변경 시에만 입력)</span>{% endif %}</label>
            <input type="password" name="password" class="form-control" placeholder="{% if user_obj %}변경하지 않으면 빈칸으로 두세요{% else %}비밀번호 입력{% endif %}">
        </div>
        <div class="col-md-4">
            <label class="form-label">이름</label>
            <input type="text" name="first_name" class="form-control" value="{{ user_obj.first_name if user_obj else '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label">성</label>
            <input type="text" name="last_name" class="form-control" value="{{ user_obj.last_name if user_obj else '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label d-block">상태</label>
            <div class="form-check form-check-inline mt-2">
                <input class="form-check-input" type="radio" name="is_active" id="is_active_on" value="on" {% if not user_obj or user_obj.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active_on">활성</label>
            </div>
            <div class="form-check form-check-inline mt-2">
                <input class="form-check-input" type="radio" name="is_active" id="is_active_off" value="off" {% if user_obj and not user_obj.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active_off">비활성</label>
            </div>
        </div>
        <div class="col-12">
            <label class="form-label">그룹</label>
            <div class="row g-2">
                {% for group in groups %}
                <div class="col-md-4 col-lg-3">
                    <label class="border rounded-3 p-2 w-100">
                        <input type="radio" name="group_id" value="{{ group.id }}" class="form-check-input me-2" {% if group.id == selected_group_id %}checked{% endif %}>
                        {{ group.name }}
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>
        <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">{% if user_obj %}저장{% else %}등록{% endif %}</button>
            <a href="/admin-users/" class="btn btn-outline-secondary">취소</a>
        </div>
    </form>
</div>
{% endblock %}
