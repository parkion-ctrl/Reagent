<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 시약 관리 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --card: rgba(255, 255, 255, 0.92);
            --accent: #2563eb;
        }
        body {
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.32), transparent 35%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.25), transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: #0f172a;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .login-shell { width: 100%; max-width: 420px; }
        .login-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.35);
            overflow: hidden;
            backdrop-filter: blur(16px);
        }
        .login-hero {
            padding: 28px 28px 18px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(14, 165, 233, 0.08));
        }
        .brand { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 18px; font-weight: 700; }
        .brand-badge {
            width: 42px; height: 42px; border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: #fff; display: grid; place-items: center;
            font-size: 1.1rem; box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
        }
        .login-body { padding: 28px; }
        .form-label { font-weight: 600; }
        .btn-login {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
        }
        .btn-login:hover { background: linear-gradient(135deg, #1d4ed8, #1e40af); }
        .login-note { color: #64748b; font-size: 0.92rem; }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <div class="login-hero">
                <div class="brand">
                    <div class="brand-badge">R</div>
                    <div>
                        <div class="fs-4">시약 관리 시스템</div>
                        <div class="text-secondary">로그인 후 이용해 주세요</div>
                    </div>
                </div>
                <p class="login-note mb-0">시약 재고 조회, 입출고, 이력 관리는 로그인 후 사용할 수 있습니다.</p>
            </div>
            <div class="login-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post" action="/login/">
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">아이디</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" autocomplete="username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-login btn-lg w-100 text-white">로그인</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
