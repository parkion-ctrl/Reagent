{% extends "base.html" %}
{% block content %}
<div class="page-card">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div>
            <h2 class="page-title mb-1">파트 관리</h2>
            <div class="text-secondary">드롭다운에 표시될 파트 코드와 명칭을 관리합니다.</div>
        </div>
        <a href="/admin-parts/new/" class="btn btn-primary">새 파트 추가</a>
    </div>

    {% if message %}
    <div class="alert alert-success py-2">{{ message }}</div>
    {% endif %}

    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>파트 코드</th>
                    <th>파트명</th>
                    <th class="text-end">작업</th>
                </tr>
            </thead>
            <tbody>
                {% for part in parts %}
                <tr>
                    <td><span class="badge bg-primary">{{ part.code }}</span></td>
                    <td>{{ part.name }}</td>
                    <td class="text-end">
                        <a href="/admin-parts/{{ part.id }}/edit/" class="btn btn-sm btn-outline-secondary me-1">수정</a>
                        <form method="post" action="/admin-parts/{{ part.id }}/delete/" class="d-inline"
                              onsubmit="return confirm('{{ part.code }} ({{ part.name }}) 파트를 삭제하시겠습니까?')">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="3" class="text-center text-muted py-4">등록된 파트가 없습니다.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <a href="/admin-panel/" class="btn btn-outline-secondary">← 관리자 허브</a>
    </div>
</div>
{% endblock %}
